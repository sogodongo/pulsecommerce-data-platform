pulsecommerce:
  target: ci
  outputs:
    ci:
      type: glue
      role_arn: "arn:aws:iam::{{ env_var('AWS_ACCOUNT_ID') }}:role/pulsecommerce-glue-role"
      region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
      workers: 2
      worker_type: G.1X
      schema: ci_gold          # isolated CI schema — does not touch prod Gold tables
      database: ci_gold
      session_provisioning_timeout_in_seconds: 120
      idle_timeout: 60
      glue_version: "4.0"
      extra_jars:
        - "s3://pulsecommerce-glue-scripts-{{ env_var('AWS_ACCOUNT_ID') }}/jars/iceberg-spark-runtime.jar"
      extra_py_files:
        - "s3://pulsecommerce-glue-scripts-{{ env_var('AWS_ACCOUNT_ID') }}/deps/dbt_glue_deps.zip"
      conf:
        spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
        spark.sql.catalog.glue_catalog: "org.apache.iceberg.spark.SparkCatalog"
        spark.sql.catalog.glue_catalog.catalog-impl: "org.apache.iceberg.aws.glue.GlueCatalog"
        spark.sql.catalog.glue_catalog.warehouse: "s3://pulsecommerce-lakehouse-{{ env_var('AWS_ACCOUNT_ID') }}/"
        spark.sql.catalog.glue_catalog.io-impl: "org.apache.iceberg.aws.s3.S3FileIO"
        spark.sql.adaptive.enabled: "true"
      query_compute_cost_percent_gte: 0  # no cost threshold in CI
